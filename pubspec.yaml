name: trac
description: "A premium production-ready AI-Powered Expense Tracker."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  firebase_database: ^11.1.1
  firebase_storage: ^12.0.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0
  google_generative_ai: ^0.4.4
  google_mlkit_text_recognition: ^0.13.0
  speech_to_text: ^6.6.1
  flutter_tts: ^4.0.2
  pdf: ^3.10.8
  excel: ^4.0.6
  intl: ^0.19.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  crypto: ^3.0.3
  flutter_svg: ^2.0.10+1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  share_plus: ^10.0.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
